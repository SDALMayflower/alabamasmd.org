<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Process | Alabama Mayflower Society</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        .coming-soon-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--navy-blue), var(--royal-blue));
            padding: 2rem;
            text-align: center;
        }
        .coming-soon-content {
            max-width: 800px;
            background: white;
            border-radius: 20px;
            padding: 4rem 3rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .coming-soon-content h1 {
            color: var(--navy-blue);
            font-size: clamp(2.5rem, 5vw, 4rem);
            margin-bottom: 1rem;
        }
        .coming-soon-content h2 {
            color: var(--royal-blue);
            font-size: clamp(2rem, 4vw, 3rem);
            margin: 2rem 0;
        }
        .back-button {
            display: inline-block;
            margin-top: 2rem;
            padding: 1rem 2.5rem;
            background: var(--navy-blue);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .back-button:hover {
            background: var(--royal-blue);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="coming-soon-container">
        <div class="coming-soon-content">
            <h1>Application Process</h1>
            <div class="separator-container">
                <img src="images/Mayflower_separator_line.jpg" alt="Separator" class="mayflower-separator" style="max-width: 300px;">
            </div>
            <h2>COMING SOON</h2>
            <p style="font-size: 1.2rem; color: var(--slate); line-height: 1.8;">
                Step-by-step application process information will be available soon!
            </p>
            <a href="membership.html" class="back-button">← Back to Membership</a>
        </div>
    </div>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Alabama Society of Mayflower Descendants &nbsp;|&nbsp; <a href="privacy-policy.html" style="color: var(--gold);">Privacy Policy</a></p>
            </div>
        </div>
    </footer>
    <script src="js/main.js"></script>
</body>
</html>
