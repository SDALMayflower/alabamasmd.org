    <style>
        /* Inline Video with Play Button Overlay */
        .video-wrapper {
            position: relative;
            width: 100%;
            max-height: 500px;
            overflow: hidden;
        }
        
        .video-wrapper video {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            display: block;
        }
        
        .video-play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .video-play-overlay:hover {
            background: rgba(0, 0, 0, 0.7);
        }
        
        .video-play-overlay.hidden {
            display: none;
        }
        
        .play-button {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--gold), var(--bronze));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(218, 165, 32, 0.5);
        }
        
        .video-play-overlay:hover .play-button {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(218, 165, 32, 0.7);
        }
        
        .play-button::after {
            content: '';
            width: 0;
            height: 0;
            border-left: 30px solid white;
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
            margin-left: 8px;
        }
        
        .play-text {
            color: white;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 700;
            text-align: center;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            padding: 0 2rem;
        }
    </style>
</head>
